<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rajas Legal Associates</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
}

/* TOP BAR */
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:14px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.75);
z-index:999;
}

.logo{
color:#d4af37;
font-weight:bold;
}

.whatsapp{
background:#25D366;
padding:10px 16px;
border-radius:20px;
text-decoration:none;
color:white;
font-weight:bold;
}

/* HERO */
.hero{
margin-top:70px;
height:90vh;
position:relative;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

/* TEXT FIXED (NO FACE OVERLAP) */
.hero-text{
position:absolute;
bottom:40px;
left:30px;
background:rgba(0,0,0,0.45);
padding:15px 18px;
border-radius:12px;
max-width:320px;
}

.hero-text h1{
font-size:26px;
color:white;
}

.gold{
color:#d4af37;
}

.hero-text p{
margin-top:8px;
font-size:14px;
color:#ddd;
}

/* SECTION */
.section{
padding:70px 10%;
background:#111;
}

.title{
font-size:30px;
color:#d4af37;
margin-bottom:20px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:#1b1b1b;
padding:18px;
border-radius:10px;
text-align:center;
}

/* CONTACT */
.contact{
background:#1b1b1b;
padding:20px;
border-radius:10px;
margin-top:15px;
}

/* STICKY */
.sticky{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
}

.sticky a{
flex:1;
text-align:center;
padding:14px;
text-decoration:none;
font-weight:bold;
color:white;
}

.call{background:#d4af37;color:black;}
.map{background:#1e88e5;}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
<div class="logo">⚖️ Rajas Legal Associates</div>
<a class="whatsapp" href="https://wa.me/919005017567">WhatsApp</a>
</div>

<!-- HERO -->
<div class="hero">

<img src="cc2b1b31-174c-474b-8e9d-a4285d4582fb.jpeg" alt="Advocate">

<div class="hero-text">
<h1>Advocate <span class="gold">Shubhanjali Shukla</span></h1>
<p>High Court Lucknow Bench</p>
</div>

</div>

<!-- PRACTICE -->
<section class="section">
<h2 class="title">Practice Areas</h2>

<div class="cards">
<div class="card">Criminal Law</div>
<div class="card">Civil Law</div>
<div class="card">Family Law</div>
<div class="card">Cyber Law</div>
<div class="card">PIL</div>
<div class="card">Arbitration</div>
</div>
</section>

<!-- CONTACT -->
<section class="section">
<h2 class="title">Contact</h2>

<div class="contact">
📞 9005017567 <br>
🏛 High Court Lucknow Bench <br>
📍 Chamber No. 509, B Block, 4th Floor
</div>
</section>

<!-- STICKY BAR -->
<div class="sticky">
<a class="call" href="tel:+919005017567">Call</a>
<a class="map" href="https://www.google.com/maps/search/?api=1&query=High+Court+Lucknow">Map</a>
</div>

</body>
</html>
